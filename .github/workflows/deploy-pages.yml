name: Deploy www/ to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build www/ from source
        run: |
          node build.js

          # Auto-set SW cache version to commit hash so every deploy busts the cache
          COMMIT=$(git rev-parse --short HEAD)
          sed -i "s/const CACHE_VERSION = [^;]*/const CACHE_VERSION = '$COMMIT'/" www/sw.js

      - name: Deploy www/ to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: www
          clean: true
          commit-message: "Deploy from master (${{ github.sha }})"
